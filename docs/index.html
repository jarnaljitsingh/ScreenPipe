<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenPipe — Floating Terminal Mirror for Claude Code</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 60%, rgba(255, 107, 53, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.06) 0%, transparent 40%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeUp 1s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon {
    width: 120px;
    height: 120px;
    border-radius: 28px;
    margin: 0 auto 30px;
    box-shadow: 0 10px 40px rgba(255, 107, 53, 0.3);
  }

  .title {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 0%, #ccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    margin-bottom: 50px;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #ff6b35 0%, #e04500 100%);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    padding: 18px 48px;
    border-radius: 16px;
    text-decoration: none;
    box-shadow: 0 8px 32px rgba(255, 107, 53, 0.4);
    margin-bottom: 40px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(255, 107, 53, 0.5);
  }

  .download-icon {
    font-size: 26px;
  }

  .link {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-bottom: 50px;
    letter-spacing: 0.5px;
  }

  .link span {
    color: #ff6b35;
  }

  .steps {
    display: flex;
    gap: 40px;
    justify-content: center;
    align-items: center;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .step-number {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 107, 53, 0.15);
    border: 2px solid rgba(255, 107, 53, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #ff6b35;
  }

  .step-text {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }

  .arrow {
    font-size: 24px;
    color: rgba(255,255,255,0.2);
    margin-top: -15px;
  }

  .badge {
    position: absolute;
    top: 40px;
    right: 50px;
    background: rgba(255, 107, 53, 0.12);
    border: 1px solid rgba(255, 107, 53, 0.3);
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    color: #ff6b35;
    letter-spacing: 1px;
  }

  .platforms {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 30px;
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="badge">FREE & OPEN SOURCE</div>

<div class="container">
  <img src="icon.png" class="icon" alt="ScreenPipe">

  <div class="title">ScreenPipe</div>
  <div class="subtitle">Floating Terminal Mirror for Claude Code</div>

  <a href="https://github.com/jarnaljitsingh/ScreenPipe/releases/latest" class="download-btn">
    <span class="download-icon">↓</span> Download Now
  </a>

  <div class="link">github.com/<span>jarnaljitsingh</span>/ScreenPipe</div>

  <div class="steps">
    <div class="step">
      <div class="step-number">1</div>
      <div class="step-text">Download ZIP</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-number">2</div>
      <div class="step-text">Move to Applications</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-number">3</div>
      <div class="step-text">Open & Use</div>
    </div>
  </div>
</div>

<div class="platforms">
  <span>Terminal.app</span>
  <span>•</span>
  <span>iTerm2</span>
  <span>•</span>
  <span>macOS 13+</span>
</div>

</body>
</html>
